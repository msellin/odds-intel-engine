name: ③ Odds

on:
  # schedule:                          # Disabled — now runs on Railway
  #   - cron: '0 5,7,8,...,22 * * *'  # Every 2h
  #   - cron: '30 13 * * *'           # Pre-kickoff afternoon
  #   - cron: '30 17 * * *'           # Pre-kickoff evening
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD)'
        required: false
        type: string
      mark_closing:
        description: 'Mark as closing line'
        required: false
        default: false
        type: boolean
      af_only:
        description: 'Skip Kambi, AF only'
        required: false
        default: false
        type: boolean

jobs:
  odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Fetch odds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.mark_closing }}" = "true" ]; then ARGS="$ARGS --mark-closing"; fi
          if [ "${{ inputs.af_only }}" = "true" ]; then ARGS="$ARGS --af-only"; fi
          python -m workers.jobs.fetch_odds $ARGS
