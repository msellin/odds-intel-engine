name: OddsIntel — Fetch Fixtures

on:
  schedule:
    # 06:00 UTC daily — before enrichment (06:15) and odds/preds (07:00)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD, default: today)'
        required: false
        type: string
      refresh_leagues:
        description: 'Refresh league coverage data'
        required: false
        default: false
        type: boolean

jobs:
  fetch-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine if league refresh needed
        id: check
        run: |
          # Refresh leagues on Mondays (day 1) or if manually requested
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.refresh_leagues }}" = "true" ]; then
            echo "refresh=true" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "1" ]; then
            echo "refresh=true" >> $GITHUB_OUTPUT
          else
            echo "refresh=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch fixtures
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ steps.check.outputs.refresh }}" = "true" ]; then
            ARGS="$ARGS --refresh-leagues"
          fi
          python -m workers.jobs.fetch_fixtures $ARGS
