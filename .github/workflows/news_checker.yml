name: OddsIntel AI News Checker

on:
  schedule:
    # 4 runs/day to catch lineup confirmations closer to kickoff:
    #   09:00 UTC — after morning pipeline (catches overnight news)
    #   12:30 UTC — midday update (early afternoon lineups)
    #   16:30 UTC — catches 18:00-19:00 UTC kickoff lineups (~2h before)
    #   19:30 UTC — catches 20:00-21:00 UTC kickoff lineups (~1.5h before)
    # Cost: ~$0.04/day total (Gemini 2.5 Flash)
    - cron: '0 9 * * *'
    - cron: '30 12 * * *'
    - cron: '30 16 * * *'
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB updates)'
        required: false
        default: 'false'
        type: boolean

jobs:
  news-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI news checker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python workers/jobs/news_checker.py --test
          else
            python workers/jobs/news_checker.py
          fi
