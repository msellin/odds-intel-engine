name: OddsIntel — Fetch Predictions & Odds

on:
  schedule:
    # 07:00 UTC — after fixtures (06:00) and enrichment (06:15)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD, default: today)'
        required: false
        type: string
      skip_scrapers:
        description: 'Skip Kambi scraper'
        required: false
        default: false
        type: boolean

jobs:
  fetch-odds-preds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch predictions and odds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ inputs.skip_scrapers }}" = "true" ]; then
            ARGS="$ARGS --skip-scrapers"
          fi
          python -m workers.jobs.fetch_predictions_odds $ARGS
