name: OddsIntel — Hourly Odds Snapshots

on:
  schedule:
    # Run every 2 hours between 06:00–22:00 UTC (09:00–01:00 EET)
    # This gives us snapshots at: T-16h, T-14h, T-12h, T-10h, T-8h, T-6h, T-4h, T-2h
    - cron: '0 6,8,10,12,14,16,18,20,22 * * *'
    # Extra run 30 min before typical European match windows (14:30 and 18:30 UTC)
    - cron: '30 13 * * *'
    - cron: '30 17 * * *'
  workflow_dispatch:
    inputs:
      mark_closing:
        description: 'Mark as closing line (for near-kickoff runs)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run odds snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ "${{ inputs.mark_closing }}" = "true" ]; then
            python workers/jobs/odds_snapshot.py --mark-closing
          else
            python workers/jobs/odds_snapshot.py
          fi
