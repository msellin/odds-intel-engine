name: ⑤ Betting

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC — after overnight data jobs
    - cron: '0 10 * * *'  # 10:00 UTC — catch morning European fixtures
    - cron: '0 13 * * *'  # 13:00 UTC — pre-afternoon kickoffs
    - cron: '0 16 * * *'  # 16:00 UTC — pre-evening kickoffs
    - cron: '0 19 * * *'  # 19:00 UTC — pre-night kickoffs
  workflow_dispatch: {}

# Duplicate bets prevented by DB unique constraint (bot_id, match_id, market, selection)
# Safe to run multiple times per day.

permissions:
  contents: write

jobs:
  betting:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Download historical data
        uses: actions/cache@v4
        with:
          path: data/processed
          key: historical-data-v1

      - name: Run betting pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m workers.jobs.betting_pipeline
