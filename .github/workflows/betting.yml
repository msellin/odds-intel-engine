name: ⑤ Betting

on:
  # schedule:                          # Disabled — now runs on Railway
  #   - cron: '0 6 * * *'             # 06:00 UTC
  #   - cron: '0 10,13,16,19 * * *'   # Intraday reruns
  workflow_dispatch: {}

# Duplicate bets prevented by DB unique constraint (bot_id, match_id, market, selection)
# Safe to run multiple times per day.

permissions:
  contents: write

jobs:
  betting:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Download historical data
        uses: actions/cache@v4
        with:
          path: data/processed
          key: historical-data-v1

      - name: Run betting pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m workers.jobs.betting_pipeline
