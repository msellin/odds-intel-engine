name: ② Enrichment

on:
  # schedule:                          # Disabled — now runs on Railway
  #   - cron: '15 4 * * *'            # 04:15 UTC — full
  #   - cron: '0 12 * * *'            # 12:00 UTC — refresh
  #   - cron: '0 16 * * *'            # 16:00 UTC — refresh
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD)'
        required: false
        type: string
      components:
        description: 'all, injuries, team_stats, standings, h2h'
        required: false
        default: 'all'
        type: string

jobs:
  enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Determine components
        id: comp
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "components=${{ inputs.components || 'all' }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "04" ]; then
            echo "components=all" >> $GITHUB_OUTPUT
          else
            echo "components=injuries,standings" >> $GITHUB_OUTPUT
          fi

      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          ARGS="--components ${{ steps.comp.outputs.components }}"
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          python -m workers.jobs.fetch_enrichment $ARGS
